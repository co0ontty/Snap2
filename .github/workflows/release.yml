name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build DMG and publish Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow (for icon generation)
        run: pip install --upgrade pip Pillow

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build DMG
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh

      - name: Verify artifact
        run: |
          ls -lh Snap2.dmg
          shasum -a 256 Snap2.dmg

      - name: Upload DMG to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Snap2.dmg
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload DMG as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Snap2-dmg
          path: Snap2.dmg
