name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build DMG and publish Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 完整 git 历史，给后续步骤用 git rev-list 计算构建号
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow (for icon generation)
        run: pip install --upgrade pip Pillow

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Sync Info.plist version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          # 'vX.Y.Z' → 'X.Y.Z'
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # 单调递增的构建号；commit 总数从远古到 HEAD
          BUILD_NUM="$(git rev-list --count HEAD)"
          PLIST="Resources/Info.plist"

          CUR_SHORT="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          CUR_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          echo "Tag           : $GITHUB_REF_NAME (→ $TAG_VERSION)"
          echo "Info.plist 旧 : short=$CUR_SHORT build=$CUR_BUILD"
          echo "Info.plist 新 : short=$TAG_VERSION build=$BUILD_NUM"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $TAG_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$PLIST"

          # 验证
          NEW_SHORT="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")"
          NEW_BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")"
          [[ "$NEW_SHORT" == "$TAG_VERSION" ]] || { echo "短版本号同步失败"; exit 1; }
          [[ "$NEW_BUILD" == "$BUILD_NUM" ]]  || { echo "构建号同步失败"; exit 1; }

      - name: Import self-signed code signing certificate
        id: import_cert
        env:
          SELF_SIGN_P12_BASE64: ${{ secrets.SELF_SIGN_P12_BASE64 }}
          SELF_SIGN_P12_PASSWORD: ${{ secrets.SELF_SIGN_P12_PASSWORD }}
          SELF_SIGN_IDENTITY: ${{ secrets.SELF_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${SELF_SIGN_P12_BASE64:-}" ] || [ -z "${SELF_SIGN_IDENTITY:-}" ]; then
            echo "未配置自签名证书 secrets，跳过导入（将回退到 ad-hoc 签名）"
            echo "self_sign=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          P12_PATH="$RUNNER_TEMP/cert.p12"

          echo "$SELF_SIGN_P12_BASE64" | base64 --decode > "$P12_PATH"

          # 创建临时 keychain，并将其加入搜索路径
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书 + 私钥；-A 让所有应用可访问私钥（CI 单次任务环境，不必收紧）
          security import "$P12_PATH" \
            -P "${SELF_SIGN_P12_PASSWORD:-}" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # 解除新 keychain 上对私钥访问的二次确认
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          # 把临时 keychain 放到搜索路径最前面，否则 codesign 找不到 identity
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          rm -f "$P12_PATH"

          echo "已导入证书，可用 identity："
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "self_sign=true" >> "$GITHUB_OUTPUT"
          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Build DMG and ZIP
        env:
          SELF_SIGN_IDENTITY: ${{ steps.import_cert.outputs.self_sign == 'true' && secrets.SELF_SIGN_IDENTITY || '' }}
          SELF_SIGN_KEYCHAIN: ${{ steps.import_cert.outputs.keychain_path }}
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh

      - name: Verify artifacts
        run: |
          ls -lh Snap2-arm64.dmg Snap2-x86_64.dmg Snap2.zip
          shasum -a 256 Snap2-arm64.dmg Snap2-x86_64.dmg Snap2.zip

      - name: Upload DMGs + ZIP to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Snap2-arm64.dmg
            Snap2-x86_64.dmg
            Snap2.zip
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Snap2-build
          path: |
            Snap2-arm64.dmg
            Snap2-x86_64.dmg
            Snap2.zip
